## nvidia-settings: X configuration file generated by user
Section "ServerLayout"
    Identifier "Layout0"
    Screen 0 "Screen0" 0 0
    Option "Xinerama" "0"
EndSection

Section "Monitor"
    Identifier "Monitor0"
    ModelName "BenQ PD2725U"
    Option "DPMS" "1"
EndSection

Section "Device"
    Identifier "Device0"
    Driver "nvidia"
    BusID "PCI:1:0:0"
    Option "Coolbits" "28"
    Option "ConnectToAcpid" "0"
    Option "RegistryDwords" "OpenGLImageSettings=3"
    Option "RegistryDwords" "OverrideMaxPerf=0x1" 
    Option "RegistryDwords" "PerfLevelSrc=0x2222" 
    Option "RegistryDwords" "PowerMizerEnable=0x1"
    Option "RegistryDwords" "PowerMizerDefault=0x1" 
    Option "RegistryDwords" "PowerMizerDefaultAC=0x1" 
    Option "RegistryDwords" "SyncToVBlank=0" 
    Option "RegistryDwords" "[gpu:0]/GPUPowerMizerMode=1"
    Option "SidebandSocketPath" "/var/run/nvidia-xdriver/"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device "Device0"
    Monitor "Monitor0"
    Option "AllowEmptyInitialConfiguration" "1"
    Option "AllowIndirectGLXProtocol" "0"
    Option "ForceFullCompositionPipeline" "1"
    Option "NoFlip" "1"
    Option "TripleBuffer" "1"
    Option "UseDisplayDevice" "DFP"
EndSection

Section "Extensions"
    Option "Composite" "1"
    Option "RENDER" "1"
EndSection
